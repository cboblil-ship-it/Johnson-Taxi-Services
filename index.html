<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Johnson Taxi Services</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f6;color:#1a1a1a;min-height:100vh}
.app{max-width:420px;min-height:100vh;margin:0 auto;background:#f4f4f6;display:flex;flex-direction:column}
.hdr{background:#1a1a2e;color:#fff;padding:1rem 1.25rem 0;position:sticky;top:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px;margin-bottom:0.75rem}
.taxi-icon{width:38px;height:38px;background:#f5c518;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;color:#1a1a2e}
.brand-t{font-size:15px;font-weight:600;color:#fff}
.brand-s{font-size:11px;color:#a0a0c0;margin-top:1px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.12)}
.tab{flex:1;padding:0.6rem 0.4rem;font-size:12px;color:#a0a0c0;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:inherit;text-align:center;transition:color 0.15s}
.tab.on{color:#f5c518;border-bottom-color:#f5c518}
.sec{padding:1rem;display:none}
.sec.on{display:block}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:0.85rem 1rem;border:1px solid #e8e8ec}
.stat-l{font-size:11px;color:#888;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:600}
.stat-v.gold{color:#9a7500}
.rides-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.rides-lbl{font-size:13px;font-weight:500;color:#555}
.filt{font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.card{background:#fff;border:1px solid #e8e8ec;border-radius:12px;padding:1rem 1.1rem;margin-bottom:0.65rem}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.pax{display:flex;align-items:center;gap:8px}
.av{width:36px;height:36px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#f5c518;flex-shrink:0}
.pn{font-size:14px;font-weight:600}
.pd{font-size:11px;color:#888;margin-top:2px}
.amt{font-size:17px;font-weight:600;color:#9a7500;white-space:nowrap}
.card-dest{display:flex;align-items:center;gap:5px;margin-top:0.6rem;padding-top:0.6rem;border-top:1px solid #f0f0f2}
.dest-t{font-size:12px;color:#666}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:600;margin-top:5px;display:inline-block}
.b-paid{background:#eaf3de;color:#3b6d11}
.b-pend{background:#faeeda;color:#854f0b}
.card-actions{display:flex;gap:8px;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #f0f0f2}
.btn-edit{display:flex;align-items:center;justify-content:center;gap:5px;flex:1;padding:7px 12px;font-size:12px;font-weight:600;border:1px solid #ddd;border-radius:8px;background:#f8f8f8;color:#1a1a2e;cursor:pointer;font-family:inherit}
.btn-edit:hover{background:#efefef}
.btn-del{display:flex;align-items:center;justify-content:center;gap:5px;flex:1;padding:7px 12px;font-size:12px;font-weight:600;border:1px solid #f5c0c0;border-radius:8px;background:#fff5f5;color:#a32d2d;cursor:pointer;font-family:inherit}
.btn-del:hover{background:#ffe8e8}
.empty{text-align:center;padding:3rem 1rem;color:#aaa}
.empty .ti{font-size:42px;margin-bottom:0.6rem;display:block}
.empty p{font-size:13px}
.frm{background:#fff;border:1px solid #e8e8ec;border-radius:12px;padding:1.25rem}
.frm-title{font-size:14px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:6px;color:#1a1a2e}
.fld{margin-bottom:0.9rem}
.fld label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
.fld input,.fld select{width:100%;padding:0.6rem 0.8rem;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa;color:#1a1a1a;font-family:inherit;transition:border-color 0.15s}
.fld input:focus,.fld select:focus{outline:none;border-color:#f5c518;background:#fff}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.cur-wrap{position:relative}
.cur-wrap input{padding-right:2.5rem}
.cur-sym{position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none;font-weight:600}
.btn-save{width:100%;padding:0.75rem;background:#f5c518;color:#1a1a2e;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:0.5rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-save:hover{background:#e6b800}
.btn-save:active{transform:scale(0.98)}
.btn-cancel{width:100%;padding:0.65rem;background:#fff;color:#555;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;margin-top:0.6rem;font-family:inherit;display:none}
.toast{background:#1a1a2e;color:#f5c518;padding:0.65rem 1.25rem;border-radius:99px;font-size:13px;font-weight:600;text-align:center;margin-top:1rem;display:none}
.toast.on{display:block}
.rep-box{background:#fff;border:1px solid #e8e8ec;border-radius:12px;padding:1rem 1.1rem;margin-bottom:0.75rem}
.rep-box-title{font-size:13px;font-weight:600;color:#555;margin-bottom:0.75rem;display:flex;align-items:center;gap:6px}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem}
.date-row .fld{margin-bottom:0}
.btn-run{width:100%;padding:0.65rem;background:#1a1a2e;color:#f5c518;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-run:hover{background:#2a2a4e}
.rep-result{display:none}
.rep-result.on{display:block}
.rep-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem}
.rep-total-row{background:#f8f6e8;border:1px solid #e8e0b0;display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1rem;border-radius:10px;margin-bottom:0.75rem}
.rep-total-label{font-size:14px;font-weight:500;color:#555;display:flex;align-items:center;gap:6px}
.rep-total-val{font-size:18px;font-weight:700;color:#9a7500}
.rep-rows{border:1px solid #e8e8ec;border-radius:10px;overflow:hidden;margin-bottom:0.75rem;background:#fff}
.rep-row{display:flex;justify-content:space-between;align-items:center;padding:0.65rem 0.9rem;border-bottom:1px solid #f0f0f2;font-size:13px}
.rep-row:last-child{border-bottom:none}
.rep-row-name{font-weight:600;color:#1a1a1a;margin-bottom:2px}
.rep-row-date{font-size:11px;color:#888}
.rep-row-right{text-align:right;flex-shrink:0;margin-left:8px}
.rep-row-amt{font-weight:600;color:#9a7500}
.rep-row-status{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;margin-top:3px;display:inline-block}
.btn-print{width:100%;padding:0.7rem;background:#fff;color:#1a1a2e;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-print:hover{background:#f4f4f6}
.rep-period-label{font-size:12px;color:#888;text-align:center;margin-bottom:0.75rem}

@media print {
  body{background:#fff}
  .hdr,.tabs,.btn-run,.btn-print,.card-actions,.btn-cancel,.sum-grid,.rides-hdr,.rep-box{display:none!important}
  .sec{display:none!important}
  #sec-report{display:block!important;padding:0}
  .rep-result{display:block!important}
  .rep-stats .stat{border:1px solid #ddd}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="taxi-icon"><i class="ti ti-car"></i></div>
      <div>
        <div class="brand-t">Johnson Taxi Services</div>
        <div class="brand-s">Trip Manager</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="showTab('rides',this)">Rides</button>
      <button class="tab" onclick="showTab('add',this)">+ New trip</button>
      <button class="tab" onclick="showTab('report',this)">Report</button>
    </div>
  </div>

  <div id="sec-rides" class="sec on">
    <div class="sum-grid">
      <div class="stat"><div class="stat-l">Total rides</div><div class="stat-v" id="s-count">0</div></div>
      <div class="stat"><div class="stat-l">Total earned</div><div class="stat-v gold" id="s-total">₪0</div></div>
    </div>
    <div class="rides-hdr">
      <span class="rides-lbl">Recent trips</span>
      <select class="filt" onchange="currentFilter=this.value;renderRides()">
        <option value="all">All</option>
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
      </select>
    </div>
    <div id="rides-list"></div>
    <div class="toast" id="toast-rides"></div>
  </div>

  <div id="sec-add" class="sec">
    <div class="frm">
      <div class="frm-title" id="form-title"><i class="ti ti-plus"></i> New trip</div>
      <div class="fld"><label>Date</label><input id="f-date" type="date"></div>
      <div class="fld"><label>Passenger name</label><input id="f-name" type="text" placeholder="e.g. David Cohen"></div>
      <div class="fld"><label>Destination</label><input id="f-dest" type="text" placeholder="e.g. Tel Aviv Central"></div>
      <div class="r2">
        <div class="fld"><label>Amount (₪)</label><div class="cur-wrap"><input id="f-amt" type="number" placeholder="0" min="0" step="1"><span class="cur-sym">₪</span></div></div>
        <div class="fld"><label>Status</label><select id="f-status"><option value="pending">Pending</option><option value="paid">Paid</option></select></div>
      </div>
      <input type="hidden" id="f-edit-id" value="">
      <button class="btn-save" onclick="saveRide()"><i class="ti ti-check"></i> <span id="btn-lbl">Save trip</span></button>
      <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()">Cancel edit</button>
    </div>
    <div class="toast" id="toast-add"></div>
  </div>

  <div id="sec-report" class="sec">
    <div class="rep-box">
      <div class="rep-box-title"><i class="ti ti-calendar-search"></i> Trip report by date range</div>
      <div class="date-row">
        <div class="fld"><label>From date</label><input id="r-from" type="date"></div>
        <div class="fld"><label>To date</label><input id="r-to" type="date"></div>
      </div>
      <div class="r2" style="margin-bottom:0">
        <div class="fld" style="margin-bottom:0"><label>Status</label>
          <select id="r-sf" style="width:100%;padding:0.6rem 0.8rem;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa;color:#1a1a1a;font-family:inherit">
            <option value="all">All</option>
            <option value="paid">Paid only</option>
            <option value="pending">Pending only</option>
          </select>
        </div>
        <div class="fld" style="margin-bottom:0;display:flex;align-items:flex-end">
          <button class="btn-run" onclick="runReport()"><i class="ti ti-search"></i> Generate</button>
        </div>
      </div>
    </div>

    <div class="rep-result" id="rep-result">
      <div class="rep-period-label" id="r-period-label"></div>
      <div class="rep-stats">
        <div class="stat"><div class="stat-l">Trips found</div><div class="stat-v" id="r-count">0</div></div>
        <div class="stat"><div class="stat-l">Paid rides</div><div class="stat-v" id="r-paid-c">0</div></div>
        <div class="stat"><div class="stat-l">Collected</div><div class="stat-v gold" id="r-paid-amt">₪0</div></div>
        <div class="stat"><div class="stat-l">Pending</div><div class="stat-v" id="r-pend-amt">₪0</div></div>
      </div>
      <div class="rep-total-row">
        <span class="rep-total-label"><i class="ti ti-receipt"></i> Period total</span>
        <span class="rep-total-val" id="r-grand">₪0</span>
      </div>
      <div class="rep-rows" id="r-rows"></div>
      <button class="btn-print" onclick="window.print()"><i class="ti ti-printer"></i> Print report</button>
    </div>
    <div class="toast" id="toast-rep"></div>
  </div>
</div>

<script>
let rides=[];
try{rides=JSON.parse(localStorage.getItem('jts_rides')||'[]');}catch(e){}
let currentFilter='all';

function save(){try{localStorage.setItem('jts_rides',JSON.stringify(rides));}catch(e){}}
function initials(n){return n.trim().split(' ').slice(0,2).map(w=>w[0]?w[0].toUpperCase():'').join('')||'?';}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function fmtAmt(a){return '₪'+parseFloat(a||0).toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2});}

function showTab(t,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  if(el)el.classList.add('on');
  if(t==='rides')renderRides();
}

function renderRides(){
  const list=document.getElementById('rides-list');
  const filtered=rides.filter(r=>currentFilter==='all'||r.status===currentFilter);
  const allTotal=rides.reduce((a,r)=>a+parseFloat(r.amount||0),0);
  document.getElementById('s-count').textContent=rides.length;
  document.getElementById('s-total').textContent=fmtAmt(allTotal);
  if(!filtered.length){
    list.innerHTML='<div class="empty"><i class="ti ti-car-off"></i><p>No trips yet. Add your first ride!</p></div>';
    return;
  }
  const sorted=[...filtered].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  list.innerHTML=sorted.map(r=>{
    const ri=rides.indexOf(r);
    return `<div class="card">
      <div class="card-top">
        <div class="pax">
          <div class="av">${initials(r.name)}</div>
          <div>
            <div class="pn">${r.name}</div>
            <div class="pd">${fmtDate(r.date)}</div>
            <span class="badge ${r.status==='paid'?'b-paid':'b-pend'}">${r.status}</span>
          </div>
        </div>
        <div class="amt">${fmtAmt(r.amount)}</div>
      </div>
      ${r.destination?`<div class="card-dest"><i class="ti ti-map-pin" style="font-size:13px;color:#aaa"></i><span class="dest-t">${r.destination}</span></div>`:''}
      <div class="card-actions">
        <button class="btn-edit" onclick="editRide(${ri})"><i class="ti ti-edit" style="font-size:14px"></i> Edit</button>
        <button class="btn-del" onclick="deleteRide(${ri})"><i class="ti ti-trash" style="font-size:14px"></i> Delete</button>
      </div>
    </div>`;
  }).join('');
}

function runReport(){
  const from=document.getElementById('r-from').value;
  const to=document.getElementById('r-to').value;
  const sf=document.getElementById('r-sf').value;
  if(!from||!to){showToast('toast-rep','Select both From and To dates');return;}
  if(from>to){showToast('toast-rep','From date must be before To date');return;}
  let results=rides.filter(r=>{
    if(!r.date||r.date<from||r.date>to)return false;
    if(sf!=='all'&&r.status!==sf)return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const total=results.reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const paidAmt=results.filter(r=>r.status==='paid').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const pendAmt=results.filter(r=>r.status==='pending').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const paidC=results.filter(r=>r.status==='paid').length;
  document.getElementById('r-period-label').textContent=`${fmtDate(from)} — ${fmtDate(to)}`;
  document.getElementById('r-count').textContent=results.length;
  document.getElementById('r-paid-c').textContent=paidC;
  document.getElementById('r-paid-amt').textContent=fmtAmt(paidAmt);
  document.getElementById('r-pend-amt').textContent=fmtAmt(pendAmt);
  document.getElementById('r-grand').textContent=fmtAmt(total);
  const rowsEl=document.getElementById('r-rows');
  if(!results.length){
    rowsEl.innerHTML='<div class="empty" style="padding:1.5rem"><p>No trips found for this period.</p></div>';
  }else{
    rowsEl.innerHTML=results.map((r,i)=>`
      <div class="rep-row">
        <div>
          <div class="rep-row-name">${i+1}. ${r.name}</div>
          <div class="rep-row-date"><i class="ti ti-map-pin" style="font-size:11px"></i> ${r.destination||'—'}</div>
          <div class="rep-row-date">${fmtDate(r.date)}</div>
        </div>
        <div class="rep-row-right">
          <div class="rep-row-amt">${fmtAmt(r.amount)}</div>
          <span class="rep-row-status ${r.status==='paid'?'b-paid':'b-pend'}">${r.status}</span>
        </div>
      </div>`).join('');
  }
  document.getElementById('rep-result').classList.add('on');
}

function saveRide(){
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  const amount=document.getElementById('f-amt').value;
  const destination=document.getElementById('f-dest').value.trim();
  const status=document.getElementById('f-status').value;
  if(!name||!date||!amount){showToast('toast-add','Fill in date, name and amount');return;}
  const id=document.getElementById('f-edit-id').value;
  if(id!==''){
    rides[parseInt(id)]={name,date,amount:parseFloat(amount),destination,status};
    save();showToast('toast-add','Trip updated');cancelEdit();
    setTimeout(()=>{showTab('rides',null);document.querySelector('.tab').classList.add('on');},900);
  }else{
    rides.push({name,date,amount:parseFloat(amount),destination,status});
    save();clearForm();showToast('toast-add','Trip saved');
    setTimeout(()=>{showTab('rides',null);document.querySelector('.tab').classList.add('on');},900);
  }
}

function editRide(idx){
  const r=rides[idx];if(!r)return;
  document.getElementById('f-date').value=r.date||'';
  document.getElementById('f-name').value=r.name||'';
  document.getElementById('f-dest').value=r.destination||'';
  document.getElementById('f-amt').value=r.amount||'';
  document.getElementById('f-status').value=r.status||'pending';
  document.getElementById('f-edit-id').value=idx;
  document.getElementById('form-title').innerHTML='<i class="ti ti-edit"></i> Edit trip';
  document.getElementById('btn-lbl').textContent='Update trip';
  document.getElementById('btn-cancel').style.display='block';
  showTab('add',null);
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.remove('on');if(i===1)b.classList.add('on');});
}

function cancelEdit(){
  clearForm();
  document.getElementById('f-edit-id').value='';
  document.getElementById('form-title').innerHTML='<i class="ti ti-plus"></i> New trip';
  document.getElementById('btn-lbl').textContent='Save trip';
  document.getElementById('btn-cancel').style.display='none';
}

function clearForm(){
  document.getElementById('f-name').value='';
  document.getElementById('f-date').value=today;
  document.getElementById('f-amt').value='';
  document.getElementById('f-dest').value='';
  document.getElementById('f-status').value='pending';
}

function deleteRide(idx){
  if(!confirm('Remove this trip?'))return;
  rides.splice(idx,1);save();renderRides();showToast('toast-rides','Trip removed');
}

function showToast(id,msg){
  const t=document.getElementById(id);t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2200);
}

const today=new Date().toISOString().split('T')[0];
const firstOfMonth=today.slice(0,8)+'01';
document.getElementById('f-date').value=today;
document.getElementById('r-from').value=firstOfMonth;
document.getElementById('r-to').value=today;
renderRides();
</script>
</body>
</html>
